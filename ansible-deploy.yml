---
- name: Deploy infrastructure-monitoring to FROG
  hosts: frog
  # No global become; use become only where needed
  vars:
    frog_host: "{{ lookup('env', 'FROG_SERVER') }}"
    frog_ssh_port: "{{ lookup('env', 'FROG_SSH_PORT') }}"
    frog_login: "{{ lookup('env', 'FROG_LOGIN') }}"
    frog_password: "{{ lookup('env', 'FROG_PASSWORD') }}"
    frog_prefix: "{{ frog_host.split('.')[0] }}"

    beszel_port: "{{ (frog_ssh_port | int + 10000) }}"
    beszel_hostname: "{{ frog_prefix }}-{{ beszel_port }}.wykr.es"

    ansible_user: "{{ frog_login }}"
    ansible_ssh_pass: "{{ frog_password }}"
    ansible_port: "{{ frog_ssh_port }}"
    ansible_become_pass: "{{ frog_password }}"
    ansible_become_method: sudo
  tasks:
    - name: Ensure /opt/infrastructure-monitoring exists
      become: true
      file:
        path: /opt/infrastructure-monitoring
        state: directory
        owner: "{{ frog_login }}"
        group: "{{ frog_login }}"
        mode: '0755'


    - name: Copy compose directory to remote
      become: true
      copy:
        src: compose/
        dest: /opt/infrastructure-monitoring/compose/
        owner: "{{ frog_login }}"
        group: "{{ frog_login }}"
        mode: preserve


    - name: Install Docker and Docker Compose on Alpine
      become: true
      block:
        - name: Ensure apk index is updated
          ansible.builtin.shell: apk update
          args:
            executable: /bin/sh
        - name: Install Docker and Docker Compose plugin
          ansible.builtin.apk:
            name:
              - docker
              - docker-compose
              - docker-cli-compose
            state: present
        - name: Ensure Docker service is started and enabled
          ansible.builtin.service:
            name: docker
            state: started
            enabled: true
        - name: Add user to docker group
          ansible.builtin.user:
            name: "{{ frog_login }}"
            groups: docker
            append: yes
        - name: Test Docker with hello-world
          become: true
          shell: |
            docker run --rm hello-world
          register: docker_hello_result
          ignore_errors: true
        - name: Reboot server if Docker hello-world fails
          become: true
          shell: reboot
          when: docker_hello_result.rc != 0
          ignore_errors: true
        - name: Fail playbook if Docker hello-world fails
          fail:
            msg: "Docker hello-world test failed. Server rebooted. Please rerun the playbook after the server is back online."
          when: docker_hello_result.rc != 0


    - name: Start beszel service
      become: true
      shell: |
        cd /opt/infrastructure-monitoring
        BESZEL_PORT_HOST="{{ beszel_port }}" \
        BESZEL_AGENT_KEY="{{ lookup('env', 'BESZEL_AGENT_KEY') }}" \
        BESZEL_AGENT_TOKEN="{{ lookup('env', 'BESZEL_AGENT_TOKEN') }}" \
        BESZEL_AGENT_HUB_URL="https://{{ beszel_hostname }}" \
        docker compose -f compose/beszel/compose.yml up -d
      args:
        executable: /bin/sh
