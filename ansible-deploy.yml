---
- name: Deploy infrastructure-monitoring to FROG
  hosts: frog
  # No global become; use become only where needed
  vars:
    frog_host: "{{ lookup('env', 'FROG_SERVER') }}"
    frog_ssh_port: "{{ lookup('env', 'FROG_SSH_PORT') }}"
    frog_login: "{{ lookup('env', 'FROG_LOGIN') }}"
    frog_password: "{{ lookup('env', 'FROG_PASSWORD') }}"
    # Derive FROG number from hostname (first numeric sequence)
    frog_num: "{{ frog_host | regex_search('([0-9]+)', '\\1') }}"
    beszel_hostname: "frog03-{{ frog_num }}.wykr.es"
    kuma_hostname: "frog03-{{ (frog_num | int + 10000) }}.wykr.es"
    env_file: "/opt/infrastructure-monitoring/.env"
    ansible_user: "{{ frog_login }}"
    ansible_ssh_pass: "{{ frog_password }}"
    ansible_port: "{{ frog_ssh_port }}"
    ansible_become_pass: "{{ frog_password }}"
    ansible_become_method: sudo
  tasks:
    - name: Ensure /opt/infrastructure-monitoring exists
      become: true
      file:
        path: /opt/infrastructure-monitoring
        state: directory
        owner: "{{ frog_login }}"
        group: "{{ frog_login }}"
        mode: '0755'

    - name: Prepare .env file on controller
      delegate_to: localhost
      run_once: true
      block:
        - name: Copy .env.example to .env if exists, else create empty
          copy:
            src: .env.example
            dest: .env
            remote_src: no
          ignore_errors: yes
        - name: Ensure .env exists
          file:
            path: .env
            state: touch
        - name: Set/replace FROG_HOST
          lineinfile:
            path: .env
            regexp: '^FROG_HOST='
            line: "FROG_HOST={{ frog_host }}"
            create: yes
        - name: Set/replace FROG_SSH_PORT
          lineinfile:
            path: .env
            regexp: '^FROG_SSH_PORT='
            line: "FROG_SSH_PORT={{ frog_ssh_port }}"
            create: yes
        - name: Set/replace BESZEL_HOSTNAME
          lineinfile:
            path: .env
            regexp: '^BESZEL_HOSTNAME='
            line: "BESZEL_HOSTNAME={{ beszel_hostname }}"
            create: yes
        - name: Set/replace KUMA_HOSTNAME
          lineinfile:
            path: .env
            regexp: '^KUMA_HOSTNAME='
            line: "KUMA_HOSTNAME={{ kuma_hostname }}"
            create: yes
        - name: Set/replace KEY
          lineinfile:
            path: .env
            regexp: '^BESZEL_AGENT_KEY='
            line: "BESZEL_AGENT_KEY={{ lookup('env', 'BESZEL_AGENT_KEY') }}"
            create: yes
        - name: Set/replace TOKEN
          lineinfile:
            path: .env
            regexp: '^BESZEL_AGENT_TOKEN='
            line: "BESZEL_AGENT_TOKEN={{ lookup('env', 'BESZEL_AGENT_TOKEN') }}"
            create: yes
        - name: Set/replace HUB_URL
          lineinfile:
            path: .env
            regexp: '^BESZEL_AGENT_HUB_URL='
            line: "BESZEL_AGENT_HUB_URL={{ lookup('env', 'BESZEL_AGENT_HUB_URL') }}"
            create: yes

    - name: Copy compose directory to remote
      become: true
      copy:
        src: compose/
        dest: /opt/infrastructure-monitoring/compose/
        owner: "{{ frog_login }}"
        group: "{{ frog_login }}"
        mode: preserve

    - name: Copy .env to remote
      become: true
      copy:
        src: .env
        dest: /opt/infrastructure-monitoring/.env
        owner: "{{ frog_login }}"
        group: "{{ frog_login }}"
        mode: '0644'

    - name: Install Docker and Docker Compose on Alpine
      become: true
      block:
        - name: Ensure apk index is updated
          ansible.builtin.shell: apk update
          args:
            executable: /bin/sh
        - name: Install Docker and Docker Compose plugin
          ansible.builtin.apk:
            name:
              - docker
              - docker-compose
              - docker-cli-compose
            state: present
        - name: Ensure Docker service is started and enabled
          ansible.builtin.service:
            name: docker
            state: started
            enabled: true
        - name: Add user to docker group
          ansible.builtin.user:
            name: "{{ frog_login }}"
            groups: docker
            append: yes


    - name: Start beszel service
      become: true
      shell: |
        cd /opt/infrastructure-monitoring
        set -a
        . .env
        set +a
        docker compose -f compose/beszel/compose.yml up -d
      args:
        executable: /bin/sh

    - name: Start uptime-kuma service
      become: true
      shell: |
        cd /opt/infrastructure-monitoring
        set -a
        . .env
        set +a
        docker compose -f compose/uptime-kuma/compose.yml up -d
      args:
        executable: /bin/sh

    - name: Verify .env exists on remote
      become: true
      stat:
        path: /opt/infrastructure-monitoring/.env
      register: env_stat

    - name: Fail if .env is missing
      fail:
        msg: ".env file is missing on the remote server!"
      when: not env_stat.stat.exists
