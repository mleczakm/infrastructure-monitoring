---
- name: Deploy infrastructure-monitoring to FROG
  hosts: all
  # No global become; use become only where needed
  vars:
    frog_host: "{{ lookup('env', 'FROG_SERVER') }}"
    frog_ssh_port: "{{ lookup('env', 'FROG_SSH_PORT') }}"
    frog_login: "{{ lookup('env', 'FROG_LOGIN') }}"
    frog_password: "{{ lookup('env', 'FROG_PASSWORD') }}"
    # Derive FROG number from hostname (first numeric sequence)
    frog_num: "{{ frog_host | regex_search('([0-9]+)', '\\1') }}"
    beszel_hostname: "frog03-{{ frog_num }}.wykr.es"
    kuma_hostname: "kuma-{{ frog_num }}.wykr.es"
    databasus_hostname: "databasus-{{ frog_num }}.wykr.es"
    env_file: "/opt/infrastructure-monitoring/.env"
  tasks:
    - name: Ensure /opt/infrastructure-monitoring exists
      become: true
      file:
        path: /opt/infrastructure-monitoring
        state: directory
        owner: "{{ frog_login }}"
        group: "{{ frog_login }}"
        mode: '0755'

    - name: Prepare .env file on controller
      delegate_to: localhost
      run_once: true
      block:
        - name: Copy .env.example to .env if exists, else create empty
          copy:
            src: .env.example
            dest: .env
            remote_src: no
          ignore_errors: yes
        - name: Ensure .env exists
          file:
            path: .env
            state: touch
        - name: Set/replace FROG_HOST
          lineinfile:
            path: .env
            regexp: '^FROG_HOST='
            line: "FROG_HOST={{ frog_host }}"
            create: yes
        - name: Set/replace FROG_SSH_PORT
          lineinfile:
            path: .env
            regexp: '^FROG_SSH_PORT='
            line: "FROG_SSH_PORT={{ frog_ssh_port }}"
            create: yes
        - name: Set/replace BESZEL_HOSTNAME
          lineinfile:
            path: .env
            regexp: '^BESZEL_HOSTNAME='
            line: "BESZEL_HOSTNAME={{ beszel_hostname }}"
            create: yes
        - name: Set/replace KUMA_HOSTNAME
          lineinfile:
            path: .env
            regexp: '^KUMA_HOSTNAME='
            line: "KUMA_HOSTNAME={{ kuma_hostname }}"
            create: yes
        - name: Set/replace DATABASUS_HOSTNAME
          lineinfile:
            path: .env
            regexp: '^DATABASUS_HOSTNAME='
            line: "DATABASUS_HOSTNAME={{ databasus_hostname }}"
            create: yes
        - name: Set/replace KEY
          lineinfile:
            path: .env
            regexp: '^KEY='
            line: "KEY={{ lookup('env', 'BESZEL_AGENT_KEY') | default('your_beszel_agent_key_here', true) }}"
            create: yes
        - name: Set/replace TOKEN
          lineinfile:
            path: .env
            regexp: '^TOKEN='
            line: "TOKEN={{ lookup('env', 'BESZEL_AGENT_TOKEN') | default('your_beszel_agent_token_here', true) }}"
            create: yes
        - name: Set/replace HUB_URL
          lineinfile:
            path: .env
            regexp: '^HUB_URL='
            line: "HUB_URL={{ lookup('env', 'BESZEL_AGENT_HUB_URL') | default('http://frog03-21363.wykr.es:8090', true) }}"
            create: yes

    - name: Copy compose directory to remote
      become: true
      copy:
        src: compose/
        dest: /opt/infrastructure-monitoring/compose/
        owner: "{{ frog_login }}"
        group: "{{ frog_login }}"
        mode: preserve

    - name: Copy .env to remote
      become: true
      copy:
        src: .env
        dest: /opt/infrastructure-monitoring/.env
        owner: "{{ frog_login }}"
        group: "{{ frog_login }}"
        mode: '0644'

    - name: Install Docker and Docker Compose on Alpine
      become: true
      block:
        - name: Ensure apk index is updated
          ansible.builtin.shell: apk update
          args:
            executable: /bin/sh
        - name: Install Docker and Docker Compose plugin
          ansible.builtin.apk:
            name:
              - docker
              - docker-compose
              - docker-cli-compose
            state: present
        - name: Ensure Docker service is started and enabled
          ansible.builtin.service:
            name: docker
            state: started
            enabled: true
        - name: Add user to docker group
          ansible.builtin.user:
            name: "{{ frog_login }}"
            groups: docker
            append: yes


    - name: Start beszel service
      become: true
      shell: |
        cd /opt/infrastructure-monitoring
        set -a
        . .env
        set +a
        docker compose -f compose/beszel/compose.yml up -d
      args:
        executable: /bin/sh

    - name: Start uptime-kuma service
      become: true
      shell: |
        cd /opt/infrastructure-monitoring
        set -a
        . .env
        set +a
        docker compose -f compose/uptime-kuma/compose.yml up -d
      args:
        executable: /bin/sh

    - name: Check required secrets in .env before deploy
      delegate_to: localhost
      run_once: true
      block:
        - name: Ensure required secrets are present in .env
          ansible.builtin.shell: |
            missing=0
            for var in KEY TOKEN HUB_URL; do
              if ! grep -q "^$var=" .env || grep -q "^$var=$" .env; then
                echo "Missing or empty: $var" >&2
                missing=1
              fi
            done
            exit $missing
          args:
            executable: /bin/sh
          register: env_check
          failed_when: env_check.rc != 0
