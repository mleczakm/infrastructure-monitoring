- name: Deploy infrastructure-monitoring to FROG
  hosts: frog
  # No global become; use become only where needed
  vars:
    frog_host: "{{ lookup('env', 'FROG_SERVER') }}"
    frog_ssh_port: "{{ lookup('env', 'FROG_SSH_PORT') }}"
    frog_login: "{{ lookup('env', 'FROG_LOGIN') }}"
    frog_password: "{{ lookup('env', 'FROG_PASSWORD') }}"
    frog_prefix: "{{ frog_host.split('.')[0] }}"

    beszel_port: "{{ (frog_ssh_port | int + 10000) }}"
    beszel_hostname: "{{ frog_prefix }}-{{ beszel_port }}.wykr.es"

    ansible_user: "{{ frog_login }}"
    ansible_ssh_pass: "{{ frog_password }}"
    ansible_port: "{{ frog_ssh_port }}"
    ansible_become_pass: "{{ frog_password }}"
    ansible_become_method: sudo
  tasks:
    - name: Install Docker and Docker Compose on Alpine
      become: true
      block:
        - name: Ensure apk index is updated
          ansible.builtin.shell: apk update
          args:
            executable: /bin/sh
        - name: Install Docker and Docker Compose plugin
          ansible.builtin.apk:
            name:
              - docker
            state: present
        - name: Ensure Docker service is started and enabled
          ansible.builtin.service:
            name: docker
            state: started
            enabled: true
        - name: Add user to docker group
          ansible.builtin.user:
            name: "{{ frog_login }}"
            groups: docker
            append: yes
        - name: Test Docker with hello-world
          become: true
          shell: |
            docker run --rm hello-world
          register: docker_hello_result
          ignore_errors: true
        - name: Reboot server if Docker hello-world fails
          become: true
          shell: reboot
          when: docker_hello_result.rc != 0
          ignore_errors: true
        - name: Fail playbook if Docker hello-world fails
          fail:
            msg: "Docker hello-world test failed. Server rebooted. Please rerun the playbook after the server is back online."
          when: docker_hello_result.rc != 0


    - name: Stop and remove existing beszel container if present
      become: true
      shell: |
        docker rm -f beszel || true
      args:
        executable: /bin/sh

    - name: Start beszel container
      become: true
      shell: |
        docker volume create beszel_data &&
        docker run -d --name beszel --restart unless-stopped \
          -p "{{ beszel_port }}:8090" \
          -v beszel_data:/beszel_data \
          -e TZ="Europe/Warsaw" \
          henrygd/beszel
      args:
        executable: /bin/sh

    - name: Set beszel-agent config variables from environment
      set_fact:
        agent_key: "{{ lookup('env', 'BESZEL_AGENT_KEY') | default('') }}"
        agent_token: "{{ lookup('env', 'BESZEL_AGENT_TOKEN') | default('') }}"
        agent_hub_url: "https://{{ beszel_hostname }}"

    - name: Stop and remove existing beszel-agent container if present
      become: true
      when: agent_key != '' and agent_token != '' and agent_hub_url != ''
      shell: |
        docker rm -f beszel-agent || true
      args:
        executable: /bin/sh

    - name: Start beszel-agent container
      become: true
      when: agent_key != '' and agent_token != '' and agent_hub_url != ''
      shell: |
        docker volume create beszel_agent_data &&
        docker run -d --name beszel-agent --restart unless-stopped --privileged \
          -v /var/run/docker.sock:/var/run/docker.sock:ro \
          -v beszel_agent_data:/var/lib/beszel-agent \
          -e LISTEN=45876 \
          -e KEY="{{ agent_key }}" \
          -e TOKEN="{{ agent_token }}" \
          -e HUB_URL="{{ agent_hub_url }}" \
          henrygd/beszel-agent
      args:
        executable: /bin/sh
