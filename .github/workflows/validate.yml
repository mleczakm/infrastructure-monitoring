---
name: Validate Infrastructure Config

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) GitHub Actions workflow lint
      - name: Lint GitHub Actions workflows (actionlint)
        uses: cssnr/actionlint-action@master
        with:
          version: v1.7.11

      # 2) YAML lint (opcjonalnie, ale polecam)
      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: ".github/workflows ansible-deploy.yml"
          config_data: |
            extends: default
            rules:
              line-length:
                max: 160
              truthy: disable

      # 3) Ansible lint (polecam)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible + ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install community.docker community.general

      - name: Run ansible-lint
        run: |
          ansible-lint ansible-deploy.yml
