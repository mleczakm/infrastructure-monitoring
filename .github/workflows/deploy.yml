name: Deploy to FROG

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python and Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible

      - name: Run Ansible Playbook
        env:
          FROG_SERVER: ${{ secrets.FROG_SERVER }}
          FROG_SSH_PORT: ${{ secrets.FROG_SSH_PORT }}
          FROG_LOGIN: ${{ secrets.FROG_LOGIN }}
          FROG_PASSWORD: ${{ secrets.FROG_PASSWORD }}
          BESZEL_AGENT_KEY: ${{ secrets.BESZEL_AGENT_KEY }}
          BESZEL_AGENT_TOKEN: ${{ secrets.BESZEL_AGENT_TOKEN }}
          BESZEL_AGENT_HUB_URL: ${{ secrets.BESZEL_AGENT_HUB_URL }}
        run: |
          ansible-playbook -i ansible-inventory ansible-deploy.yml --ssh-extra-args='-o StrictHostKeyChecking=no'
