---
name: Deploy to FROG

on:
  workflow_dispatch:
  push:
    branches: ["main"]

concurrency:
  group: frog-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Ansible + dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          ansible-galaxy collection install ansible-collections-requirements.yml

      # (Opcjonalnie, lepsze security niż StrictHostKeyChecking=no)
      # Jeśli nie chcesz tego utrzymywać, usuń ten krok i zostań przy -o StrictHostKeyChecking=no
      - name: Add FROG host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.FROG_SSH_PORT }}" "${{ secrets.FROG_SERVER }}" >> ~/.ssh/known_hosts

      - name: Run Ansible Playbook
        env:
          FROG_SERVER: ${{ secrets.FROG_SERVER }}
          FROG_SSH_PORT: ${{ secrets.FROG_SSH_PORT }}
          FROG_LOGIN: ${{ secrets.FROG_LOGIN }}
          FROG_PASSWORD: ${{ secrets.FROG_PASSWORD }}
          BESZEL_AGENT_KEY: ${{ secrets.BESZEL_AGENT_KEY }}
          BESZEL_AGENT_TOKEN: ${{ secrets.BESZEL_AGENT_TOKEN }}
        run: |
          ansible-playbook -i ansible-inventory ansible-deploy.yml \
            --diff
