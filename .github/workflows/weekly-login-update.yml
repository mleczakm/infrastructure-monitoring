name: Weekly FROG login & update

on:
  schedule:
    - cron: "7 6 * * 1" # co poniedziałek 06:07 UTC
  workflow_dispatch:

jobs:
  weekly-login-update:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    permissions:
      contents: read
      issues: write

    steps:
      - name: Try SSH login and update packages (Alpine)
        id: sshupdate
        uses: appleboy/ssh-action@v1.0.3
        env:
          FROG_PASSWORD: ${{ secrets.FROG_PASSWORD }}
        with:
          host: ${{ secrets.FROG_SERVER }}
          username: ${{ secrets.FROG_LOGIN }}
          password: ${{ secrets.FROG_PASSWORD }}
          port: ${{ secrets.FROG_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "Login timestamp (UTC): $(date -u)"

            # Non-interactive sudo using password from env
            echo "$FROG_PASSWORD" | sudo -S -i sh -lc '
              set -euo pipefail
              apk update
              apk upgrade -U
            
              echo "[cleanup] docker system prune"
              docker system prune -af --volumes
            
              echo "[cleanup] large logs"
              find /var/log -type f -name "*.log" -size +1M -exec truncate -s 0 {} \;
            '

      - name: Create or update GitHub Issue on failure (no spam)
        if: failure()
        uses: actions/github-script@v7
        env:
          FROG_SERVER: ${{ secrets.FROG_SERVER }}
        with:
          script: |
            const server = process.env.FROG_SERVER || 'unknown';
            const title = `ALERT: Weekly login/update failed on FROG (${server})`;
            const label = 'infra-alert';
            const now = new Date().toISOString();

            // Find existing open issue with the label and same title
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            const existing = issues.find(i => i.title === title);

            const bodyLines = [
              'Automatyczny login/aktualizacja na FROG nie powiodły się.',
              '',
              `Czas (UTC): ${now}`,
              '',
              'Sprawdź:',
              '- dostępność serwera',
              '- dane SSH (host/port/login/hasło)',
              '- czy sudo działa non-interactive',
            ];
            const body = bodyLines.join('\\n');

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Kolejna próba nieudana.\\n\\n${body}`,
              });
              core.info(`Updated existing issue: #${existing.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
              core.info(`Created issue: #${issue.number}`);
            }